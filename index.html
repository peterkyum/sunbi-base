<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="선비칼국수">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#7B4A1E">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css?v=17">
<title>선비칼국수 재고관리</title>
</head>
<body>

<!-- ── 로그인 화면 ── -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-title">선비칼국수</div>
    <div class="login-sub">재고관리 시스템에 로그인해 주세요</div>
    <div class="login-label">이메일</div>
    <input class="login-input" id="loginEmail" type="email" placeholder="이메일 주소" autocomplete="email">
    <div class="login-label">비밀번호</div>
    <input class="login-input" id="loginPw" type="password" placeholder="비밀번호" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')App.handleLogin()">
    <div class="login-err" id="loginErr"></div>
    <button class="btn-main" id="loginBtn" onclick="App.handleLogin()">로그인</button>
  </div>
</div>

<!-- ── 앱 본문 ── -->
<div id="appBody" style="display:none">

<header class="topbar">
  <span class="topbar-title">선비칼국수</span>
  <span id="roleBadge" class="role-badge"></span>
  <span class="topbar-date" id="todayStr"></span>
  <div class="sync-dot" id="syncDot"></div>
  <button class="back-to-hub-btn" id="backToHubBtn" onclick="App.goBackToHub()">← 허브</button>
</header>

<div class="sec on" id="sec-input"><div id="inputMain"></div></div>
<div class="sec" id="sec-dash"><div id="dashMain"></div></div>
<div class="sec" id="sec-order"><div id="orderMain"></div></div>
<div class="sec" id="sec-inbound"><div id="inboundMain"></div></div>
<div class="sec" id="sec-history"><div id="historyMain"></div></div>

<nav class="tabs">
  <button class="tab on" data-tab="input" onclick="App.goTab('input')"><span class="tab-icon">📦</span>재고입력</button>
  <button class="tab" data-tab="dash" onclick="App.goTab('dash')"><span class="tab-icon">📊</span>대시보드</button>
  <button class="tab" data-tab="order" onclick="App.goTab('order')"><span class="tab-icon">🛒</span>자동발주</button>
  <button class="tab" data-tab="inbound" onclick="App.goTab('inbound')"><span class="tab-icon">📋</span>입고관리</button>
  <button class="tab" data-tab="history" onclick="App.goTab('history')"><span class="tab-icon">📅</span>히스토리</button>
</nav>


<!-- 품목 추가 모달 -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)InboundPage.closeAddModal()">
  <div class="modal">
    <button class="modal-close" onclick="InboundPage.closeAddModal()">✕</button>
    <div class="modal-title">새 품목 추가</div>
    <div class="modal-label">품목명</div>
    <input class="modal-input" id="newName" placeholder="예: 비빔장소스">
    <div class="modal-row">
      <div><div class="modal-label">단위</div><input class="modal-input" id="newUnit" placeholder="kg, L, 개"></div>
      <div><div class="modal-label">월 평균 사용량</div><input class="modal-input" id="newAvg" type="number" inputmode="numeric" placeholder="0"></div>
    </div>
    <div class="modal-label">이번 달 입고량</div>
    <input class="modal-input" id="newInbound" type="number" inputmode="numeric" placeholder="0">
    <button class="btn-main" onclick="InboundPage.addItem()">추가하기</button>
  </div>
</div>

</div><!-- /appBody -->

<!-- JS 모듈 로드 순서 중요: 의존성 순서대로 -->
<script defer src="config.local.js" onerror=""></script>
<script defer src="js/api.js?v=17"></script>
<script defer src="js/auth.js?v=17"></script>
<script defer src="js/ui.js?v=17"></script>
<script defer src="js/items.js?v=17"></script>
<script defer src="js/notify.js?v=17"></script>
<script defer src="js/pages/input.js?v=17"></script>
<script defer src="js/pages/dashboard.js?v=17"></script>
<script defer src="js/pages/order.js?v=17"></script>
<script defer src="js/pages/inbound.js?v=17"></script>
<script defer src="js/pages/history.js?v=17"></script>
<script defer src="js/app.js?v=17"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
