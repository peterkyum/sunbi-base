<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="선비칼국수">
<title>선비칼국수 재고관리</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#2D6A1F;--green-light:#EAF3DE;--green-mid:#639922;
  --amber:#854F0B;--amber-light:#FAEEDA;
  --red:#A32D2D;--red-light:#FCEBEB;
  --blue:#0C447C;--blue-light:#E6F1FB;
  --gray-900:#1a1a1a;--gray-600:#666;--gray-300:#ccc;--gray-100:#f5f5f3;
  --white:#fff;--border:rgba(0,0,0,0.1);
}

/* ── 로그인 화면 ── */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--gray-100)}
.login-card{background:var(--white);border-radius:20px;border:1px solid var(--border);padding:32px 24px;width:100%;max-width:360px}
.login-logo{height:56px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}.login-logo img{height:56px;width:auto;object-fit:contain}
.login-title{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--gray-600);text-align:center;margin-bottom:28px}
.login-label{font-size:12px;font-weight:700;color:var(--gray-600);margin-bottom:6px}
.login-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:15px;font-family:'Noto Sans KR',sans-serif;color:var(--gray-900);background:var(--white);margin-bottom:12px}
.login-input:focus{outline:none;border-color:var(--green)}
.login-err{font-size:12px;color:var(--red);text-align:center;margin-bottom:10px;min-height:18px}
.role-badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-left:8px}
.role-dist{background:var(--amber-light);color:var(--amber)}
.role-hq{background:var(--green-light);color:var(--green)}
.logout-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:4px 12px;font-size:12px;color:var(--gray-600);cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-left:auto}
.logout-btn:hover{background:var(--gray-100)}

body{font-family:'Noto Sans KR',sans-serif;background:var(--gray-100);color:var(--gray-900);min-height:100vh;padding-bottom:90px}

.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.logo{height:32px;display:flex;align-items:center;flex-shrink:0}.logo img{height:32px;width:auto;object-fit:contain}
.topbar-title{font-size:15px;font-weight:700}
.topbar-date{font-size:11px;color:var(--gray-600);margin-top:1px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--gray-300);margin-left:auto;flex-shrink:0}
.sync-dot.ok{background:var(--green-mid)}
.sync-dot.err{background:var(--red)}

.tabs{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr 1fr 1fr;z-index:100}
.tab{border:none;background:transparent;padding:8px 2px 13px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--gray-300);font-size:9px;font-family:'Noto Sans KR',sans-serif;transition:color 0.15s}
.tab.on{color:var(--green);font-weight:700}
.tab-icon{font-size:20px}

.sec{display:none;padding:16px}
.sec.on{display:block}

.card{background:var(--white);border-radius:14px;border:1px solid var(--border);padding:16px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:700;color:var(--gray-600);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:14px}

.alert{display:flex;align-items:flex-start;gap:8px;padding:10px 14px;border-radius:10px;margin-bottom:10px;font-size:13px;line-height:1.5}
.alert-red{background:var(--red-light);color:var(--red)}
.alert-amber{background:var(--amber-light);color:var(--amber)}
.alert-green{background:var(--green-light);color:var(--green)}
.alert-blue{background:var(--blue-light);color:var(--blue)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.dot-red{background:var(--red)}.dot-amber{background:var(--amber)}.dot-green{background:var(--green)}.dot-blue{background:var(--blue)}

.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.metric{background:var(--gray-100);border-radius:10px;padding:14px}
.metric-label{font-size:11px;color:var(--gray-600);margin-bottom:5px}
.metric-val{font-size:26px;font-weight:700;line-height:1}
.metric-unit{font-size:11px;color:var(--gray-600);margin-top:3px}

.bar-row{display:grid;grid-template-columns:90px 1fr 36px;align-items:center;gap:8px;margin-bottom:10px}
.bar-name{font-size:11px;color:var(--gray-600);line-height:1.3}
.bar-bg{height:7px;background:var(--gray-100);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 0.5s ease}
.bar-pct{font-size:11px;color:var(--gray-600);text-align:right}

.input-item{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:14px;margin-bottom:8px}
.input-item-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.item-name{font-size:14px;font-weight:700}
.item-info{font-size:11px;color:var(--gray-600);text-align:right;line-height:1.5}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.input-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.input-label{font-size:11px;color:var(--gray-600);margin-bottom:4px;font-weight:700}
.input-val{font-size:13px;color:var(--gray-600);background:var(--gray-100);border-radius:7px;padding:8px 10px}
.qty-input{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:8px 10px;font-size:16px;font-family:'Noto Sans KR',sans-serif;color:var(--gray-900);background:var(--white);text-align:right;-webkit-appearance:none;box-sizing:border-box}
.qty-input:focus{outline:none;border-color:var(--green)}
.qty-inbound{border-color:var(--blue)!important}
.qty-inbound:focus{border-color:var(--blue)!important;box-shadow:0 0 0 2px rgba(74,144,226,0.15)}
.consumed-preview{margin-top:8px;padding:8px 10px;border-radius:7px;font-size:12px;font-weight:700;text-align:center;background:var(--green-light);color:var(--green)}

.btn-main{width:100%;padding:15px;background:var(--green);color:var(--white);border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:4px;transition:opacity 0.15s}
.btn-main:active{opacity:0.8}
.btn-main:disabled{background:var(--gray-300);cursor:not-allowed}
.btn-sub{width:100%;padding:12px;background:var(--blue);color:var(--white);border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:8px}

.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;font-size:10px;font-weight:700;color:var(--gray-600);padding:6px 8px;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:9px 8px;border-bottom:1px solid var(--border);color:var(--gray-900);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}

.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.badge-red{background:var(--red-light);color:var(--red)}
.badge-amber{background:var(--amber-light);color:var(--amber)}
.badge-green{background:var(--green-light);color:var(--green)}
.badge-blue{background:var(--blue-light);color:var(--blue)}

.order-item{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:14px;margin-bottom:8px}
.order-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.order-name{font-size:14px;font-weight:700}
.order-qty{font-size:22px;font-weight:700;color:var(--green)}
.order-detail{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.od-label{font-size:10px;color:var(--gray-600);margin-bottom:2px}
.od-val{font-size:13px;font-weight:700}

.inbound-item{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:14px;margin-bottom:8px}
.inbound-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end}
.modal-bg.show{display:flex}
.modal{background:var(--white);border-radius:20px 20px 0 0;padding:20px 20px 40px;width:100%}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.modal-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:15px;font-family:'Noto Sans KR',sans-serif;color:var(--gray-900);margin-bottom:10px}
.modal-input:focus{outline:none;border-color:var(--green)}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.modal-label{font-size:12px;font-weight:700;color:var(--gray-600);margin-bottom:5px}
.modal-close{float:right;background:transparent;border:none;font-size:22px;cursor:pointer;color:var(--gray-600)}

.success-screen{text-align:center;padding:40px 20px}
.success-circle{width:64px;height:64px;background:var(--green-light);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:28px}
.success-title{font-size:18px;font-weight:700;margin-bottom:6px}
.success-sub{font-size:13px;color:var(--gray-600);line-height:1.6}
.btn-ghost{border:1.5px solid var(--border);background:transparent;border-radius:10px;padding:10px 24px;font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;color:var(--gray-900);margin-top:16px}

.loading-box{text-align:center;padding:40px 20px;color:var(--gray-600);font-size:13px}
.spinner{width:28px;height:28px;border:3px solid var(--gray-300);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

.month-select{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;font-family:'Noto Sans KR',sans-serif;color:var(--gray-900);background:var(--white);margin-bottom:12px}
.month-select:focus{outline:none;border-color:var(--green)}
.section-label{font-size:12px;font-weight:700;color:var(--gray-600);margin:16px 0 8px;padding:0 2px}

/* ── 재고 조정 ── */
.adj-item{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:14px;margin-bottom:8px}
.adj-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.adj-name{font-size:14px;font-weight:700}
.adj-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;align-items:end}
.adj-label{font-size:11px;color:var(--gray-600);margin-bottom:4px;font-weight:700}
.adj-val{font-size:14px;font-weight:700;color:var(--gray-600);background:var(--gray-100);border-radius:7px;padding:8px 10px}
.adj-new{font-size:14px;font-weight:700;color:var(--green)}
.diff-chip{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;margin-top:6px}
.diff-plus{background:var(--red-light);color:var(--red)}
.diff-minus{background:var(--green-light);color:var(--green)}
.diff-zero{background:var(--gray-100);color:var(--gray-600)}
.date-select{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;font-family:'Noto Sans KR',sans-serif;color:var(--gray-900);background:var(--white);margin-bottom:12px}
.date-select:focus{outline:none;border-color:var(--green)}
.adj-banner{background:var(--blue-light);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--blue);margin-bottom:12px;line-height:1.6}

/* ── 로그아웃 확인 모달 ── */
.logout-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;align-items:center;justify-content:center}
.logout-modal-bg.show{display:flex}
.logout-modal{background:var(--white);border-radius:18px;padding:28px 24px 20px;width:calc(100% - 48px);max-width:320px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
.logout-modal-title{font-size:16px;font-weight:700;margin-bottom:8px}
.logout-modal-sub{font-size:13px;color:var(--gray-600);margin-bottom:22px;line-height:1.5}
.logout-modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.logout-cancel{border:1.5px solid var(--border);background:transparent;border-radius:10px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;color:var(--gray-900)}
.logout-confirm{border:none;background:var(--red);border-radius:10px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;color:var(--white)}
</style>
</head>
<body>

function getHeaders(){return {'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SESSION_TOKEN};}

async function sbGet(table, query=''){
  const res = await fetch(`${SB_URL}/rest/v1/${table}?${query}`, {headers:{...getHeaders(),'Prefer':'return=representation'}});
  if(!res.ok) throw new Error(await res.text());
  return res.json();
}
async function sbInsert(table, data){
  const res = await fetch(`${SB_URL}/rest/v1/${table}`, {
    method:'POST', headers:{...getHeaders(),'Prefer':'return=representation'},
    body: JSON.stringify(data)
  });
  if(!res.ok) throw new Error(await res.text());
  return res.json();
}
async function sbUpsert(table, data, onConflict){
  const res = await fetch(`${SB_URL}/rest/v1/${table}?on_conflict=${onConflict}`, {
    method:'POST', headers:{...getHeaders(),'Prefer':'resolution=merge-duplicates,return=representation'},
    body: JSON.stringify(data)
  });
  if(!res.ok) throw new Error(await res.text());
  return res.json();
}
async function sbDelete(table, query){
  const res = await fetch(`${SB_URL}/rest/v1/${table}?${query}`, {method:'DELETE', headers:getHeaders()});
  if(!res.ok) throw new Error(await res.text());
}

async function renderInput(){
  const ITEMS=loadItems();
  const today=todayISO();

  try{
    const rows=await sbGet('stocks',`date=eq.${today}&select=item_id,remain_qty`);
    rows.forEach(r=>{todayData[r.item_id]=r.remain_qty;});
  }catch(e){console.error(e);}

  // 이번달 입고량
  let inboundData={};
  try{
    const rows=await sbGet('inbound',`month=eq.${month}&select=item_id,qty`);
    rows.forEach(r=>{inboundData[r.item_id]=r.qty;});
  }catch(e){}

  // 전일 재고
  const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
  const yISO=yesterday.toISOString().split('T')[0];
  let prevData={};
  try{
    const rows=await sbGet('stocks',`date=eq.${yISO}&select=item_id,remain_qty`);
    rows.forEach(r=>{prevData[r.item_id]=r.remain_qty;});
  }catch(e){}

  // ── 본사: 읽기 전용 뷰 ──
  if(currentRole==='hq'){
    const hasToday = ITEMS.length > 0 && ITEMS.some(it => todayData[it.id] !== undefined);
    let html = hasToday
      ? `<div class="alert alert-green"><div class="dot dot-green"></div>유통사가 오늘 재고를 입력했어요. 대시보드에서 전체 현황을 확인하세요.</div>`
      : `<div class="alert alert-amber"><div class="dot dot-amber"></div>아직 오늘 재고가 입력되지 않았어요.</div>`;

    ITEMS.forEach(it=>{
      const current = todayData[it.id]!==undefined ? todayData[it.id] : null;
      const prev = prevData[it.id]!==undefined ? prevData[it.id] : null;
      const ib = inboundData[it.id]||0;
      html+=`<div class="input-item">
        <div class="input-item-top">
          <span class="item-name">${it.name}</span>
          <span class="item-info">${prev!==null?`전일 ${prev}${it.unit}`:'전일 미입력'}<br>입고 +${ib}${it.unit}</span>
        </div>
        <div class="input-row">
          <div>
            <div class="input-label">전날 최종재고</div>
            <div class="input-val">${prev!==null?prev+ib:ib}${it.unit}</div>
          </div>
          <div>
            <div class="input-label">현재 재고</div>
            <div class="input-val" style="color:${current!==null?'var(--green)':'var(--gray-600)'}">
              ${current!==null?current+it.unit:'미입력'}
            </div>
          </div>
        </div>
      </div>`;
    });
    document.getElementById('inputMain').innerHTML=html;
    return;
  }

  // 오늘 이미 모든 품목이 제출됐으면 (메모리 또는 DB 기준) 성공 화면
  if(!resetMode){
    const allSubmitted = ITEMS.length > 0 && ITEMS.every(it => todayData[it.id] !== undefined);
    if(allSubmitted) submitted = true;
  }

  if(submitted){
    document.getElementById('inputMain').innerHTML=`
    <div class="success-screen">
      <div class="success-circle">✓</div>
      <div class="success-title">오늘 재고 제출 완료!</div>
      <div class="success-sub">서버에 저장됐어요.<br>본사에서 실시간으로 확인할 수 있어요 😊</div>
      <button class="btn-ghost" onclick="resetInput()">다시 입력하기</button>
    </div>`;
    return;
  }

  let html=`<div class="alert alert-amber"><div class="dot dot-amber"></div>오늘 남은 재고와 당일 입고 수량을 품목별로 입력해 주세요.</div>`;

  ITEMS.forEach(it=>{
    // resetMode(다시 입력하기)일 때는 오늘 제출값을 전날 최종재고로 사용
    const prevBase = resetMode && todayData[it.id]!==undefined
      ? todayData[it.id]
      : (prevData[it.id]!==undefined ? prevData[it.id] : null);
    const savedRemain=(!resetMode && todayData[it.id]!==undefined)?todayData[it.id]:'';

    const prevStock=prevBase!==null?prevBase:null;
    // theory: 전날 + 당일 입고 -> 실시간 계산은 JS로 (초기값만)
    const initIb=0;
    const initTheory=prevStock!==null?prevStock+initIb:initIb;
    const consumed=savedRemain!==''?(initTheory-Number(savedRemain)):null;

    const prevLabel = resetMode && todayData[it.id]!==undefined

        <span class="item-info">${prevLabel}</span>
      </div>
      <div class="input-row-3">

          <div class="input-label">전날 최종재고</div>
          <div class="input-val">${prevStock!==null?prevStock+it.unit:'미입력'}</div>
        </div>
        <div>
          <div class="input-label">당일 입고 수량</div>
          <input class="qty-input qty-inbound" type="number" inputmode="numeric" placeholder="0"
            id="inp-ib-${it.id}" value="${savedIb}"
            oninput="previewConsumed3('${it.id}',${prevStock??0},'${it.unit}')">
        </div>
        <div>
          <div class="input-label">현재 재고 입력</div>
          <input class="qty-input" type="number" inputmode="numeric" placeholder="0"
            id="inp-${it.id}" value="${savedRemain}"
            oninput="previewConsumed3('${it.id}',${prevStock??0},'${it.unit}')">
        </div>
      </div>
      <div class="consumed-preview" id="prev-${it.id}" style="display:${consumed!==null?'block':'none'}">
        오늘 소진량: ${consumed!==null?consumed:0}${it.unit}
      </div>
    </div>`;
  });

  html+=`<button class="btn-main" id="submitBtn" onclick="submitStocks()">오늘 재고 제출하기</button>`;
  document.getElementById('inputMain').innerHTML=html;
  resetMode=false;
}

function previewConsumed(id,theory,unit){
  const el=document.getElementById('inp-'+id);
  const prev=document.getElementById('prev-'+id);
  if(!el||el.value===''){prev.style.display='none';return;}
  const consumed=theory-parseInt(el.value||0);
  prev.style.display='block';
  prev.textContent=`오늘 소진량: ${consumed}${unit}`;
  prev.style.color=consumed<0?'#A32D2D':'#2D6A1F';
  prev.style.background=consumed<0?'#FCEBEB':'#EAF3DE';
}

// 3단 레이아웃 실시간 소진량 계산
function previewConsumed3(id, prevStock, unit){
  const elIb=document.getElementById('inp-ib-'+id);
  const elRemain=document.getElementById('inp-'+id);
  const prevEl=document.getElementById('prev-'+id);
  const ib=elIb&&elIb.value!==''?parseInt(elIb.value)||0:0;
  const theory=prevStock+ib;
  if(!elRemain||elRemain.value===''){if(prevEl)prevEl.style.display='none';return;}
  const consumed=theory-parseInt(elRemain.value||0);
  prevEl.style.display='block';
  prevEl.textContent=`오늘 소진량: ${consumed}${unit}  (전날${prevStock}+입고${ib}-현재재고)`;
  prevEl.style.color=consumed<0?'#A32D2D':'#2D6A1F';
  prevEl.style.background=consumed<0?'#FCEBEB':'#EAF3DE';
}

async function submitStocks(){
  const ITEMS=loadItems();
  const today=todayISO();
  const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
  const yISO=yesterday.toISOString().split('T')[0];
  const month=thisMonth();
  const btn=document.getElementById('submitBtn');

  let allFilled=true;
  ITEMS.forEach(it=>{const el=document.getElementById('inp-'+it.id);if(!el||el.value==='')allFilled=false;});
  if(!allFilled){alert('모든 품목의 현재 재고를 입력해 주세요!');return;}

  btn.disabled=true;btn.textContent='저장 중...';

  try{
    const prevRows = await sbGet('stocks',`date=eq.${yISO}&select=item_id,remain_qty`);
    const prevMap={};prevRows.forEach(r=>{prevMap[r.item_id]=r.remain_qty;});

    // 당일 입고 수량 수집
    const ibEntries=[];
    ITEMS.forEach(it=>{
      const ibEl=document.getElementById('inp-ib-'+it.id);
      const ibVal=ibEl&&ibEl.value!==''?parseInt(ibEl.value)||0:0;
      if(ibVal>0) ibEntries.push({month,item_id:it.id,qty:ibVal,_addOnly:true});
    });

    // 당일 입고가 있으면 기존 이번달 입고에 누적 저장
    if(ibEntries.length>0){
      const existIbRows=await sbGet('inbound',`month=eq.${month}&select=item_id,qty`);
      const existIbMap={};
      existIbRows.forEach(r=>{existIbMap[r.item_id]=r.qty;});
      const upsertIb=ibEntries.map(e=>({
        month,
        item_id:e.item_id,
        qty:(existIbMap[e.item_id]||0)+e.qty
      }));
      // 기존 행 삭제 후 재삽입 (upsert 대신)
      const affectedIds=upsertIb.map(e=>e.item_id);
      for(const id of affectedIds){
        await sbDelete('inbound',`month=eq.${month}&item_id=eq.${id}`);
      }
      await sbInsert('inbound',upsertIb);
    }

    // 현재 재고 저장
    await sbDelete('stocks',`date=eq.${today}`);

    const rows=ITEMS.map(it=>{
      const val=parseInt(document.getElementById('inp-'+it.id).value)||0;
      const ibEl=document.getElementById('inp-ib-'+it.id);
      const todayIb=ibEl&&ibEl.value!==''?parseInt(ibEl.value)||0:0;
      const prev=prevMap[it.id]!==undefined?prevMap[it.id]:0;
      const theory=prev+todayIb;
      return {
        date:today,
        item_id:it.id,
        item_name:it.name,
        remain_qty:val,
        consumed_qty:theory-val,
        submitted_by:'유통사담당자'
      };
    });

    await sbInsert('stocks',rows);
    // 당일 입고 맵 구성 (텔레그램 알림용)
    const dailyIbMap={};
    ibEntries.forEach(e=>{dailyIbMap[e.item_id]=e.qty;});
    await sendTelegramNotification(rows, today, dailyIbMap);
    await sendNotificationEmail(rows, today);
    submitted=true;
    document.getElementById('syncDot').className='sync-dot ok';
    renderInput();
  }catch(e){
    alert('저장 오류: '+e.message);
    btn.disabled=false;btn.textContent='오늘 재고 제출하기';
    document.getElementById('syncDot').className='sync-dot err';
  }
}

async function renderDash(){
  document.getElementById('dashMain').innerHTML='<div class="loading-box"><div class="spinner"></div>불러오는 중...</div>';
  const ITEMS=loadItems();
  const today=todayISO();
  const month=thisMonth();

  try{
    const [todayRows, ibRows] = await Promise.all([
      sbGet('stocks',`date=eq.${today}&select=item_id,remain_qty,consumed_qty`),
      sbGet('inbound',`month=eq.${month}&select=item_id,qty`)
    ]);
    const todayMap={};todayRows.forEach(r=>{todayMap[r.item_id]=r;});
    const ibMap={};ibRows.forEach(r=>{ibMap[r.item_id]=r.qty;});

    const statuses=ITEMS.map(it=>{
      const row=todayMap[it.id];
      const current=row?row.remain_qty:null;
      const consumed=row?row.consumed_qty:null;
      const ratio=current!==null&&it.monthAvg>0?Math.round(current/it.monthAvg*100):null;
      return {...it,current,consumed,ratio,danger:ratio!==null&&ratio<15,warning:ratio!==null&&ratio<25&&!(ratio<15)};
    });

    const totalConsumed=statuses.reduce((a,s)=>a+(s.consumed||0),0);
    const dangerCount=statuses.filter(s=>s.danger).length;
    const warningCount=statuses.filter(s=>s.warning).length;

    let html='';
    statuses.filter(s=>s.danger).forEach(s=>{html+=`<div class="alert alert-red"><div class="dot dot-red"></div>${s.name} 재고 ${s.current}${s.unit} — 평균 대비 ${s.ratio}% 남음. 즉시 확인!</div>`;});
    statuses.filter(s=>s.warning).forEach(s=>{html+=`<div class="alert alert-amber"><div class="dot dot-amber"></div>${s.name} 재고 ${s.current}${s.unit} — 평균 대비 ${s.ratio}% 남음.</div>`;});
    if(!dangerCount&&!warningCount) html+=`<div class="alert alert-green"><div class="dot dot-green"></div>모든 품목 재고 정상입니다 👍</div>`;

    html+=`<div class="metric-grid">
      <div class="metric"><div class="metric-label">오늘 총 소진</div><div class="metric-val">${totalConsumed}</div><div class="metric-unit">합산 수량</div></div>
      <div class="metric"><div class="metric-label">위험 품목</div><div class="metric-val" style="color:${dangerCount>0?'var(--red)':'inherit'}">${dangerCount}</div><div class="metric-unit">즉시 확인</div></div>
    </div>`;

    html+=`<div class="card"><div class="card-title">품목별 잔여율</div>`;
    statuses.forEach(s=>{
      const pct=Math.min(100,s.ratio??0);
      const color=pct<15?'#E24B4A':pct<25?'#EF9F27':'#639922';
      html+=`<div class="bar-row"><span class="bar-name">${s.name}</span><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div><span class="bar-pct">${s.current!==null?pct+'%':'—'}</span></div>`;
    });
    html+=`</div>`;

    html+=`<div class="card"><div class="card-title">전체 현황</div><div style="overflow-x:auto"><table class="tbl">
      <thead><tr><th>품목</th><th>현재</th><th>소진</th><th>상태</th></tr></thead><tbody>`;
    statuses.forEach(s=>{
      const badge=s.danger?'<span class="badge badge-red">위험</span>':s.warning?'<span class="badge badge-amber">주의</span>':'<span class="badge badge-green">정상</span>';
      html+=`<tr><td style="font-weight:700">${s.name}</td><td>${s.current!==null?s.current+s.unit:'미입력'}</td><td>${s.consumed!==null?s.consumed+s.unit:'—'}</td><td>${badge}</td></tr>`;
    });
    html+=`</tbody></table></div></div>`;

    // 최근 5일 기록
    const history=await sbGet('stocks',`select=date,item_id,remain_qty&order=date.desc&limit=${ITEMS.length*5}`);
    const days=[...new Set(history.map(r=>r.date))].slice(0,5);
    if(days.length>0){
      const histMap={};
      history.forEach(r=>{if(!histMap[r.date])histMap[r.date]={};histMap[r.date][r.item_id]=r.remain_qty;});
      html+=`<div class="card"><div class="card-title">최근 입력 기록</div><div style="overflow-x:auto"><table class="tbl">
        <thead><tr><th>날짜</th>${ITEMS.map(it=>`<th>${it.name.slice(0,3)}</th>`).join('')}</tr></thead><tbody>`;
      days.forEach(d=>{
        html+=`<tr><td style="font-weight:700;white-space:nowrap">${fmtDate(d)}</td>`;
        ITEMS.forEach(it=>{html+=`<td>${histMap[d]?.[it.id]!==undefined?histMap[d][it.id]:'—'}</td>`;});
        html+=`</tr>`;
      });
      html+=`</tbody></table></div></div>`;
    }

    // 본사만 재고 조정 버튼 보임
    if(currentRole==='hq'){
      html+=`<button class="btn-sub" onclick="openAdjModal()" style="margin-top:4px">📋 전일 재고 조정하기</button>`;
    }

    document.getElementById('dashMain').innerHTML=html;
  }catch(e){
    document.getElementById('dashMain').innerHTML=`<div class="alert alert-red"><div class="dot dot-red"></div>서버 연결 오류: ${e.message}</div>`;
  }
}

// ══════════════════════
// 3. 자동 발주 (월초·월말 재고 기반 실사용량 분석)
// ══════════════════════
async function renderOrder(){
  document.getElementById('orderMain').innerHTML='<div class="loading-box"><div class="spinner"></div>월별 사용량 분석 중...</div>';
  const ITEMS=loadItems();
  const today=todayISO();

  try{
    // ── 분석 대상: 오늘 포함 최근 4개월 ──
    const months=[];
    for(let i=0;i<4;i++){
      const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-i);
      months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
    }
    const currentMonth = months[0];
    const analyzeMonths = months.slice(1); // 완료된 달만 분석 (1~3개월 전)

    // ── 오늘 재고 ──
    const todayRows = await sbGet('stocks',`date=eq.${today}&select=item_id,remain_qty`);
    const todayMap={};todayRows.forEach(r=>{todayMap[r.item_id]=r.remain_qty;});

    // ── 입고 데이터 (전체) ──
    const allIbRows = await sbGet('inbound',`select=month,item_id,qty`);
    const ibMap={}; // ibMap[month][item_id] = qty
    allIbRows.forEach(r=>{
      if(!ibMap[r.month])ibMap[r.month]={};
      ibMap[r.month][r.item_id]=r.qty;
    });

    // ── 월별 첫날·마지막날 재고 조회 ──
    // 각 분석 달의 전체 stocks 조회해서 JS에서 첫날/마지막날 추출
    const monthlyUsage={}; // monthlyUsage[item_id] = [usage1, usage2, ...]
    ITEMS.forEach(it=>{monthlyUsage[it.id]=[];});

    for(const m of analyzeMonths){
      const [y,mo]=m.split('-').map(Number);
      const startDate=`${y}-${String(mo).padStart(2,'0')}-01`;
      const nextMo=mo===12?`${y+1}-01`:`${y}-${String(mo+1).padStart(2,'0')}`;
      const mRows = await sbGet('stocks',`date=gte.${startDate}&date=lt.${nextMo}-01&select=date,item_id,remain_qty&order=date.asc`);

      if(mRows.length===0) continue;

      // 날짜별 그룹핑
      const dateSet=[...new Set(mRows.map(r=>r.date))].sort();
      if(dateSet.length<2) continue; // 데이터가 1일치 뿐이면 분석 불가

      const firstDate=dateSet[0];
      const lastDate=dateSet[dateSet.length-1];

      const firstMap={},lastMap={};
      mRows.filter(r=>r.date===firstDate).forEach(r=>{firstMap[r.item_id]=r.remain_qty;});
      mRows.filter(r=>r.date===lastDate).forEach(r=>{lastMap[r.item_id]=r.remain_qty;});

      ITEMS.forEach(it=>{
        const s=firstMap[it.id];
        const e=lastMap[it.id];
        const ib=(ibMap[m]||{})[it.id]||0;
        if(s!==undefined && e!==undefined){
          // 사용량 = 월초재고 + 입고 - 월말재고
          const usage=s+ib-e;
          if(usage>=0) monthlyUsage[it.id].push({month:m,start:s,end:e,ib,usage});
        }
      });
    }

    // ── 이번달 현재까지 사용량 (참고용) ──
    const curMonthStart=`${currentMonth}-01`;
    const curRows = await sbGet('stocks',`date=gte.${curMonthStart}&select=date,item_id,remain_qty&order=date.asc`);
    const curDateSet=[...new Set(curRows.map(r=>r.date))].sort();
    const curFirstMap={};
    if(curDateSet.length>0){
      curRows.filter(r=>r.date===curDateSet[0]).forEach(r=>{curFirstMap[r.item_id]=r.remain_qty;});
    }

    // ── HTML 생성 ──
    let html=`<div class="adj-banner">📊 <strong>실사용량 기반 발주 분석</strong><br>최근 완료된 달의 <strong>월초 재고 + 입고 - 월말 재고</strong> = 월 사용량을 계산해 발주 수량을 제안합니다. (안전재고 +15% 포함)</div>`;

    ITEMS.forEach(it=>{
      const usages=monthlyUsage[it.id];
      const avgUsage=usages.length>0?Math.round(usages.reduce((a,u)=>a+u.usage,0)/usages.length):null;
      const current=todayMap[it.id]!==undefined?todayMap[it.id]:null;
      const rec=avgUsage!==null?Math.max(0,Math.ceil(avgUsage*(1+SAFETY)-(current??0))):null;

      // 이번달 현재까지 사용량
      const curStart=curFirstMap[it.id];
      const curIb=(ibMap[currentMonth]||{})[it.id]||0;
      const curUsedSoFar=(curStart!==undefined&&current!==null)?curStart+curIb-current:null;

      const noData=usages.length===0;
      html+=`<div class="order-item">
        <div class="order-top">
          <span class="order-name">${it.name}</span>
          <span class="order-qty" style="color:${rec===null?'var(--gray-600)':rec>0?'var(--green)':'var(--blue)'}">
            ${rec!==null?rec+it.unit:(noData?'데이터 부족':'—')}
          </span>
        </div>
        <div style="font-size:11px;color:var(--gray-600);margin-bottom:8px">이번 달 추천 발주량 (평균 사용량 × 1.15 - 현재 재고)</div>
        <div class="order-detail">
          <div><div class="od-label">평균 월 사용량</div><div class="od-val">${avgUsage!==null?avgUsage+it.unit:'미산출'}</div></div>
          <div><div class="od-label">현재 재고</div><div class="od-val">${current!==null?current+it.unit:'미입력'}</div></div>
          <div><div class="od-label">이번달 현재까지 소진</div><div class="od-val">${curUsedSoFar!==null?curUsedSoFar+it.unit:'—'}</div></div>
        </div>
        ${usages.length>0?`
        <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
          <div style="font-size:10px;font-weight:700;color:var(--gray-600);margin-bottom:6px">월별 사용량 내역</div>
          <div style="overflow-x:auto"><table class="tbl">
            <thead><tr><th>월</th><th>월초</th><th>입고</th><th>월말</th><th>사용량</th></tr></thead>
            <tbody>
              ${usages.map(u=>`<tr>
                <td style="white-space:nowrap">${fmtMonth(u.month)}</td>
                <td>${u.start}${it.unit}</td>
                <td>+${u.ib}${it.unit}</td>
                <td>${u.end}${it.unit}</td>
                <td style="font-weight:700;color:var(--green)">${u.usage}${it.unit}</td>
              </tr>`).join('')}
              ${usages.length>1?`<tr style="background:var(--gray-100)">
                <td style="font-weight:700">평균</td>
                <td colspan="3"></td>
                <td style="font-weight:700;color:var(--green-mid)">${avgUsage}${it.unit}</td>
              </tr>`:''}
            </tbody>
          </table></div>
        </div>`:''}
      </div>`;
    });

    const hasAnyRec=ITEMS.some(it=>{
      const usages=monthlyUsage[it.id];
      return usages.length>0;
    });

    if(hasAnyRec){
      html+=`<button class="btn-main" id="orderBtn" onclick="confirmOrder()">발주 확정하기</button>`;
    } else {
      html+=`<div class="alert alert-blue"><div class="dot dot-blue"></div>월초·월말 재고 데이터가 쌓이면 자동으로 발주 분석이 시작돼요. 최소 1개월치 데이터가 필요합니다.</div>`;
    }

    // 발주 히스토리
    const orderRows=await sbGet('orders',`select=order_date,item_count&order=order_date.desc&limit=5`);
    if(orderRows.length>0){
      html+=`<div class="card" style="margin-top:12px"><div class="card-title">발주 히스토리</div><table class="tbl">
        <thead><tr><th>발주일</th><th>품목 수</th><th>상태</th></tr></thead><tbody>`;
      orderRows.forEach(o=>{html+=`<tr><td>${fmtDate(o.order_date)}</td><td>${o.item_count}개</td><td><span class="badge badge-green">완료</span></td></tr>`;});
      html+=`</tbody></table></div>`;
    }

    document.getElementById('orderMain').innerHTML=html;
  }catch(e){
    document.getElementById('orderMain').innerHTML=`<div class="alert alert-red"><div class="dot dot-red"></div>서버 연결 오류: ${e.message}</div>`;
  }
}

async function confirmOrder(){
  const ITEMS=loadItems();
  const btn=document.getElementById('orderBtn');
  btn.disabled=true;btn.textContent='저장 중...';
  try{
    await sbInsert('orders',{order_date:todayISO(),item_count:ITEMS.length});
    alert('발주가 확정됐어요!');
    renderOrder();
  }catch(e){
    alert('저장 오류: '+e.message);
    btn.disabled=false;btn.textContent='발주 확정하기';
  }
}

// 4. 입고 관리
// ══════════════════════
let selectedMonth=thisMonth();

async function renderInbound(){
  document.getElementById('inboundMain').innerHTML='<div class="loading-box"><div class="spinner"></div>불러오는 중...</div>';
  const ITEMS=loadItems();

  const months=[];
  for(let i=0;i<6;i++){const d=new Date();d.setMonth(d.getMonth()-i);months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);}

  try{
    const ibRows=await sbGet('inbound',`month=eq.${selectedMonth}&select=item_id,qty`);
    const ibMap={};ibRows.forEach(r=>{ibMap[r.item_id]=r.qty;});

    let html=`<div class="card-title" style="padding:2px 0 0">월별 입고량 관리</div>
    <select class="month-select" onchange="changeMonth(this.value)">
      ${months.map(m=>`<option value="${m}" ${m===selectedMonth?'selected':''}>${fmtMonth(m)}</option>`).join('')}
    </select>`;

    ITEMS.forEach(it=>{
      const val=ibMap[it.id]!==undefined?ibMap[it.id]:'';
      html+=`<div class="inbound-item">
        <div class="inbound-top">
          <span class="item-name" style="font-size:14px;font-weight:700">${it.name}</span>
          <span class="badge badge-blue">${val!==''?val+it.unit:'미입력'}</span>
        </div>
        <div class="input-row">
          <div><div class="input-label">월 평균 사용량</div><div class="input-val">${it.monthAvg}${it.unit}</div></div>
          <div><div class="input-label">${fmtMonth(selectedMonth)} 입고량</div>
            <input class="qty-input" type="number" inputmode="numeric" placeholder="0" id="ib-${it.id}" value="${val}">
          </div>
        </div>
      </div>`;
    });

    html+=`<button class="btn-main" onclick="saveInboundMonth()">입고량 저장하기</button>`;
    html+=`<button class="btn-sub" onclick="openModal()">+ 새 품목 추가하기</button>`;

    html+=`<div class="section-label">등록된 품목 목록 (${ITEMS.length}개)</div>
    <div class="card"><table class="tbl">
      <thead><tr><th>품목명</th><th>단위</th><th>월평균</th><th></th></tr></thead><tbody>`;
    ITEMS.forEach((it,idx)=>{
      html+=`<tr>
        <td style="font-weight:700">${it.name}</td><td>${it.unit}</td><td>${it.monthAvg}</td>
        <td><button onclick="deleteItem(${idx})" style="border:none;background:var(--red-light);color:var(--red);border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif">삭제</button></td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;

    document.getElementById('inboundMain').innerHTML=html;
  }catch(e){
    document.getElementById('inboundMain').innerHTML=`<div class="alert alert-red"><div class="dot dot-red"></div>서버 연결 오류: ${e.message}</div>`;
  }
}

function changeMonth(m){selectedMonth=m;renderInbound();}

async function saveInboundMonth(){
  const ITEMS=loadItems();
  const btn=document.querySelector('#inboundMain .btn-main');
  if(btn){btn.disabled=true;btn.textContent='저장 중...';}
  try{
    const rows=[];
    ITEMS.forEach(it=>{
      const el=document.getElementById('ib-'+it.id);
      if(el&&el.value!=='') rows.push({month:selectedMonth,item_id:it.id,qty:parseInt(el.value)||0});
    });
    // 기존 삭제 후 재삽입
    await sbDelete('inbound',`month=eq.${selectedMonth}`);
    if(rows.length>0) await sbInsert('inbound',rows);
    alert(`${fmtMonth(selectedMonth)} 입고량이 저장됐어요!`);
    renderInbound();
  }catch(e){
    alert('저장 오류: '+e.message);
    if(btn){btn.disabled=false;btn.textContent='입고량 저장하기';}
  }
}

function deleteItem(idx){
  if(!confirm('이 품목을 삭제할까요?'))return;
  const items=loadItems();items.splice(idx,1);saveItems(items);renderInbound();
}

function openModal(){document.getElementById('modalBg').classList.add('show');document.getElementById('newName').focus();}
function closeModal(e){if(e.target===document.getElementById('modalBg'))closeModalDirect();}
function closeModalDirect(){
  document.getElementById('modalBg').classList.remove('show');
  ['newName','newUnit','newAvg','newInbound'].forEach(id=>{document.getElementById(id).value='';});
}
function addItem(){
  const name=document.getElementById('newName').value.trim();
  const unit=document.getElementById('newUnit').value.trim()||'개';
  const avg=parseInt(document.getElementById('newAvg').value)||0;
  const ib=parseInt(document.getElementById('newInbound').value)||0;
  if(!name){alert('품목명을 입력해 주세요!');return;}
  const items=loadItems();
  const id='item_'+Date.now();
  items.push({id,name,unit,monthAvg:avg});
  saveItems(items);
  closeModalDirect();
  // 이번달 입고량 저장
  if(ib>0){
    sbInsert('inbound',[{month:selectedMonth,item_id:id,qty:ib}]).catch(console.error);
  }
  renderInbound();
}

// 유통사 이메일 목록 (소문자로 저장)
const DIST_EMAILS = ['dist@sunbi.com'];
const HQ_EMAILS   = ['hq@sunbi.com'];

let currentUser = null;
let currentRole = null; // 'dist' | 'hq'

async function doLogin(){
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const pw    = document.getElementById('loginPw').value;
  const btn   = document.getElementById('loginBtn');
  const err   = document.getElementById('loginErr');
  err.textContent = '';
  if(!email||!pw){err.textContent='이메일과 비밀번호를 입력해 주세요.';return;}
  btn.disabled=true; btn.textContent='로그인 중...';
  try{
    const res = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SB_KEY},
      body:JSON.stringify({email,password:pw})
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error_description||data.msg||'로그인 실패');
    SESSION_TOKEN = data.access_token;
    currentUser   = data.user;
    const emailLower = email.toLowerCase().trim();
    currentRole = HQ_EMAILS.some(e=>e.toLowerCase()===emailLower) ? 'hq' : 'dist';
    console.log('로그인 이메일:', emailLower, '/ 역할:', currentRole);
    onLoginSuccess();
  }catch(e){
    err.textContent = e.message==='Invalid login credentials' ? '이메일 또는 비밀번호가 틀렸어요.' : e.message;
    btn.disabled=false; btn.textContent='로그인';
  }
}

function onLoginSuccess(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appBody').style.display='block';

  // 역할 배지 표시
  const badge = document.getElementById('roleBadge');
  if(currentRole==='hq'){
    badge.textContent='본사';
    badge.className='role-badge role-hq';
  } else {
    badge.textContent='유통사';
    badge.className='role-badge role-dist';
  }

  // 탭 표시 초기화 (로그아웃 후 재로그인 대비)
  document.querySelectorAll('.tab').forEach(t=>{ t.style.display='flex'; });

  if(currentRole==='dist'){
    // 유통사는 재고입력 탭만
    document.querySelectorAll('.tab').forEach((t,i)=>{
      if(i!==0) t.style.display='none';
    });
    // sec-input 강제 활성화 (이전 계정 화면 오염 방지)
    document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
    document.getElementById('sec-input').classList.add('on');
    document.querySelectorAll('.tab')[0].classList.add('on');
    checkConnection();
    renderInput();
  } else {
    // 본사는 재고입력 탭 숨기고 대시보드를 기본으로
    document.querySelectorAll('.tab')[0].style.display='none';
    const tabs = document.querySelectorAll('.tab');
    const secs = document.querySelectorAll('.sec');
    secs.forEach(s=>s.classList.remove('on'));
    tabs.forEach(t=>t.classList.remove('on'));
    document.getElementById('sec-dash').classList.add('on');
    tabs[1].classList.add('on');
    checkConnection();
    renderDash();
  }
}

function doLogout(){
  document.getElementById('logoutModalBg').classList.add('show');
}
function cancelLogout(){
  document.getElementById('logoutModalBg').classList.remove('show');
}
function confirmLogout(){
  document.getElementById('logoutModalBg').classList.remove('show');
  SESSION_TOKEN = SB_KEY;
  currentUser   = null;
  currentRole   = null;
  submitted     = false;
  resetMode     = false;
  // 모든 섹션 내용 초기화 (다음 계정 로그인 시 이전 데이터 잔류 방지)
  ['inputMain','dashMain','orderMain','inboundMain'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.innerHTML='';
  });
  // 활성 섹션/탭 리셋
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('sec-input').classList.add('on');
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('appBody').style.display='none';
  document.getElementById('loginEmail').value='';
  document.getElementById('loginPw').value='';
  document.getElementById('loginErr').textContent='';
  document.getElementById('loginBtn').disabled=false;
  document.getElementById('loginBtn').textContent='로그인';
}

let adjData = {};

function openAdjModal(){
  // 최근 7일 날짜 옵션 생성
  const sel = document.getElementById('adjDate');
  sel.innerHTML = '<option value="">날짜 선택...</option>';
  for(let i=1;i<=7;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const iso=d.toISOString().split('T')[0];
    const label=`${d.getMonth()+1}/${d.getDate()} (${['일','월','화','수','목','금','토'][d.getDay()]})`;
    sel.innerHTML+=`<option value="${iso}">${iso} ${label}</option>`;
  }
  document.getElementById('adjRows').innerHTML='<div style="text-align:center;padding:20px;color:#666;font-size:13px">날짜를 선택해 주세요</div>';
  document.getElementById('adjModalBg').classList.add('show');
}

function closeAdjModal(e){if(e.target===document.getElementById('adjModalBg'))closeAdjModalDirect();}
function closeAdjModalDirect(){document.getElementById('adjModalBg').classList.remove('show');}

async function loadAdjData(){
  const date = document.getElementById('adjDate').value;
  if(!date) return;
  const ITEMS = loadItems();
  const rows = document.getElementById('adjRows');
  rows.innerHTML='<div class="loading-box"><div class="spinner"></div>불러오는 중...</div>';
  try{
    const stockRows = await sbGet('stocks',`date=eq.${date}&select=item_id,item_name,remain_qty,consumed_qty`);
    const stockMap={};stockRows.forEach(r=>{stockMap[r.item_id]=r;});
    adjData={};
    let html='';
    ITEMS.forEach(it=>{
      const row=stockMap[it.id];
      const remain=row?row.remain_qty:null;
      const consumed=row?row.consumed_qty:null;
      adjData[it.id]={remain,consumed};
      const diff=0;
      html+=`<div class="adj-item">
        <div class="adj-top">
          <span class="adj-name">${it.name}</span>
          <span style="font-size:11px;color:var(--gray-600)">${it.unit}</span>
        </div>
        <div class="adj-row">
          <div>
            <div class="adj-label">유통사 입력값</div>
            <div class="adj-val">${remain!==null?remain+'박스':'미입력'}</div>
          </div>
          <div>
            <div class="adj-label">소진량</div>
            <div class="adj-val">${consumed!==null?consumed+'박스':'—'}</div>
          </div>
          <div>
            <div class="adj-label">본사 수정값</div>
            <input class="qty-input" type="number" inputmode="numeric"
              placeholder="${remain!==null?remain:0}"
              id="adj-${it.id}" value="${remain!==null?remain:''}"
              oninput="previewAdjDiff('${it.id}',${remain!==null?remain:0})">
          </div>
        </div>
        <div id="adjdiff-${it.id}"></div>
      </div>`;
    });
    rows.innerHTML=html||'<div style="text-align:center;padding:20px;color:#666;font-size:13px">해당 날짜 데이터가 없어요</div>';
  }catch(e){
    rows.innerHTML=`<div style="color:var(--red);font-size:13px;padding:10px">오류: ${e.message}</div>`;
  }
}

function previewAdjDiff(id, original){
  const el=document.getElementById('adj-'+id);
  const diffEl=document.getElementById('adjdiff-'+id);
  if(!el||!diffEl) return;
  if(el.value===''){diffEl.innerHTML='';return;}
  const newVal=parseInt(el.value)||0;
  const diff=newVal-original;
  if(diff===0){diffEl.innerHTML='<span class="diff-chip diff-zero">변경 없음</span>';return;}
  diffEl.innerHTML=`<span class="diff-chip ${diff>0?'diff-plus':'diff-minus'}">${diff>0?'+':''}${diff}박스 조정</span>`;
}

async function saveAdjustment(){
  const date=document.getElementById('adjDate').value;
  if(!date){alert('날짜를 선택해 주세요!');return;}
  const ITEMS=loadItems();
  const btn=document.getElementById('adjSaveBtn');
  btn.disabled=true;btn.textContent='저장 중...';

  try{
    // 전일 재고 가져오기 (소진량 재계산용)
    const yesterday=new Date(date);yesterday.setDate(yesterday.getDate()-1);
    const yISO=yesterday.toISOString().split('T')[0];
    const month=date.slice(0,7);
    const [prevRows,ibRows]=await Promise.all([
      sbGet('stocks',`date=eq.${yISO}&select=item_id,remain_qty`),
      sbGet('inbound',`month=eq.${month}&select=item_id,qty`)
    ]);
    const prevMap={};prevRows.forEach(r=>{prevMap[r.item_id]=r.remain_qty;});
    const ibMap={};ibRows.forEach(r=>{ibMap[r.item_id]=r.qty;});

    // 수정된 값으로 업데이트
    const updates=[];
    ITEMS.forEach(it=>{
      const el=document.getElementById('adj-'+it.id);
      if(!el||el.value==='') return;
      const newRemain=parseInt(el.value)||0;
      const prev=prevMap[it.id]!==undefined?prevMap[it.id]:0;
      const ib=ibMap[it.id]||0;
      const theory=prev+ib;
      const newConsumed=theory-newRemain;
      updates.push({item_id:it.id, remain_qty:newRemain, consumed_qty:newConsumed});
    });

    // 각 품목 업데이트
    for(const u of updates){
      await fetch(`${SB_URL}/rest/v1/stocks?date=eq.${date}&item_id=eq.${u.item_id}`,{
        method:'PATCH',
        headers:{...getHeaders(),'Prefer':'return=representation'},
        body:JSON.stringify({remain_qty:u.remain_qty, consumed_qty:u.consumed_qty, submitted_by:'본사조정'})
      });
    }

    alert(`${date} 재고 조정 완료! 소진량이 재계산됐어요 ✓`);
    closeAdjModalDirect();
    if(document.getElementById('sec-dash').classList.contains('on')) renderDash();
  }catch(e){
    alert('저장 오류: '+e.message);
  }finally{
    btn.disabled=false;btn.textContent='저장 및 소진량 재계산';
  }
}

// ── 초기 실행 ──
// 로그인 화면만 먼저 보여줌
</script>

<!-- 재고 조정 모달 (본사 전용) -->
<div class="modal-bg" id="adjModalBg" onclick="closeAdjModal(event)">
  <div class="modal" style="max-height:85vh;overflow-y:auto">
    <button class="modal-close" onclick="closeAdjModalDirect()">✕</button>
    <div class="modal-title">📋 전일 재고 조정</div>
    <div class="adj-banner">유통사 입력값이 잘못됐을 때 본사에서 직접 수정해요.<br>저장하면 소진량이 자동으로 재계산돼요.</div>
    <div class="modal-label">조정할 날짜 선택</div>
    <select class="date-select" id="adjDate" onchange="loadAdjData()"></select>
    <div id="adjRows"><div style="text-align:center;padding:20px;color:#666;font-size:13px">날짜를 선택해 주세요</div></div>
    <button class="btn-main" id="adjSaveBtn" onclick="saveAdjustment()">저장 및 소진량 재계산</button>
  </div>
</div>

</div><!-- /appBody -->
